<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="color-scheme" content="dark" />

    <title>Pixel Defense — Retro Tower Defense Game</title>
    <meta name="description" content="Pixel Defense is a free, browser-based retro tower defense game. Place towers, survive endless waves, master random events and climb the high-score board." />
    <meta name="keywords" content="pixel defense, tower defense, retro game, browser game, react game, html5 canvas, free game, indie game" />
    <meta name="author" content="MiguelJiRo" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pixel Defense — Retro Tower Defense Game" />
    <meta property="og:description" content="A minimalist pixel-art tower defense in your browser. Build, upgrade, and survive randomized waves." />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pixel Defense — Retro Tower Defense Game" />
    <meta name="twitter:description" content="A minimalist pixel-art tower defense in your browser. Build, upgrade, and survive randomized waves." />
    <meta property="og:image" content="/logo.png" />
    <meta name="twitter:image" content="/logo.png" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Pixel Defense",
        "description": "A free retro pixel-art tower defense game playable in the browser.",
        "genre": ["Strategy", "Tower Defense"],
        "applicationCategory": "Game",
        "operatingSystem": "Web",
        "author": { "@type": "Person", "name": "MiguelJiRo" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-0: #07070b;
        --bg-1: #0e0e16;
        --bg-2: #15151f;
        --bg-3: #1c1c2a;
        --line: #2a2a3d;
        --line-strong: #3c3c55;
        --text: #e6e6f0;
        --text-dim: #8a8aa3;
        --accent: #00ff88;
        --accent-dim: #00cc6a;
        --warning: #ffcc00;
        --danger: #ff3355;
        --money: #ffd24a;
        --info: #4ad1ff;
        --magenta: #ff5ad8;
        --font-display: 'Press Start 2P', system-ui, monospace;
        --font-body: 'VT323', 'Courier New', monospace;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: var(--font-body);
        background: radial-gradient(ellipse at top, #11111c 0%, #07070b 60%, #000 100%);
        color: var(--text);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        font-size: 18px;
      }

      #root {
        display: flex;
        flex-direction: column;
      }

      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      ::selection {
        background: var(--accent);
        color: #000;
      }

      img,
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <p style="padding: 24px; text-align: center;">Pixel Defense requires JavaScript to run. Please enable it.</p>
    </noscript>
    <div id="root" role="application" aria-label="Pixel Defense game"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
